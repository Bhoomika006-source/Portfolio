<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Bhoomika M Itagi</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="education.html">Education</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="youtube.html" target="_blank">YouTube</a></li>
        </ul>
        <div class="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <!-- Contact Section -->
    <section id="contact" class="fade-in-section page-section">
        <h2>Contact Me</h2>
        <div class="contact-wrapper">
            <div class="contact-info" id="contact-container">
                <!-- Contact info injected via JS -->
            </div>

            <!-- Contact Form -->
            <div class="contact-form-container">
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Contact Number</label>
                        <input type="tel" id="phone" placeholder="Enter your number" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" placeholder="Enter your address" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn-glass">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 MyPortfolio. All Rights Reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="js/constants.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
